
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

/* ✅ CORRECTION FOND D'ÉCRAN : images (7).jpeg appliqué à toute la page */
body{
    background-image: url('images (7).jpeg');
    background-size: cover; /* L'image couvre tout l'écran */
    background-position: center; /* L'image est centrée */
    background-repeat: no-repeat; /* L'image ne se répète pas */
    background-attachment: fixed; /* Le fond reste fixe au défilement */
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    margin: 0;
}

.app{
    width:100%;
    max-width:400px;
    padding:20px;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.logo{text-align:center;margin-bottom:15px;}
.logo img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #25D366;
    background:#fff;
    padding:5px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h1{text-align:center;font-size:1.6em;}
p.subtitle{text-align:center;opacity:0.85;margin-bottom:15px;}

.counter{
    background:#ff4d4d;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-size:1em;
    margin-bottom:15px;
}

.input-group{margin-bottom:14px;}

input, select, textarea{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    outline:none;
    background:rgba(255,255,255,0.18);
    color:#fff;
    font-size:1em;
}

input::placeholder, textarea::placeholder{color:#ddd;}

input:focus, select:focus, textarea:focus{
    border:1px solid #25D366;
    background:rgba(255,255,255,0.28);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#25D366,#128C7E);
    color:#fff;
    font-weight:bold;
    font-size:1.05em;
    cursor:pointer;
    transition: all 0.3s ease;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
}

button::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0; left:-100%;
    background:rgba(255,255,255,0.2);
    transform:skewX(-20deg);
    transition: all 0.5s ease;
}

button:hover::after{left:100%;}
button:hover{transform:scale(1.05) translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3);}
button:active{transform:scale(0.98);}

.success{
    display:none;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

.payment{margin-top:20px;font-size:0.95em;}

.payment-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.payment-item img{
    width:35px;
    height:35px;
    object-fit:contain;
    background:#fff;
    border-radius:6px;
    padding:3px;
}

#qrCode{margin-top:12px;text-align:center;}

.secure-info{
    margin-top:10px;
    font-size:0.85em;
    color:#ccc;
    text-align:center;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
<div class="app">
<div class="card">

<div class="logo"><img src="téléchargement.png" alt="Logo"></div>

<h1>Groupe Premium 📚</h1>
<p class="subtitle">Réussis avec les meilleurs 🔥</p>

<div class="counter">⚠️ Places restantes : 20</div>

<div class="input-group"><input type="text" id="nom" placeholder="Nom complet"></div>
<div class="input-group"><input type="tel" id="numero" placeholder="Numéro WhatsApp"></div>

<div class="input-group">
<select id="niveau">
<option value="">Choisir ton niveau</option>
<option value="BEPC/CAP">BEPC / CAP</option>
<option value="Probatoire">Probatoire</option>
<option value="Baccalauréat">Baccalauréat</option>
</select>
</div>

<div class="input-group">
<input type="text" id="montant" readonly placeholder="Frais d’adhésion">
</div>

<div class="input-group">
<label style="font-weight:bold;">📸 Capture de paiement</label>
<input type="file" id="preuve">
</div>

<div class="input-group">
<input type="text" id="transaction" placeholder="Numéro de transaction (facultatif)">
</div>

<div class="input-group">
<textarea id="message" placeholder="Motif d’adhésion"></textarea>
</div>

<button onclick="envoyer()">Envoyer</button>

<div class="secure-info">
🚨 Vos informations sont envoyées de manière sécurisée
</div>

<div class="success" id="msg"></div>

<div class="payment">

<div class="payment-item">
<img src="images (6).jpeg" alt="MTN Mobile Money">
<div>MTN MoMo : <strong>651959164</strong></div>
</div>

<div class="payment-item">
<img src="téléchargement.png" alt="Orange Money">
<div>Orange Money : <strong>658074753</strong></div>
</div>

<p style="text-align:center;margin-top:10px;">Montant : <span id="montantPaiement">--</span></p>

<div id="qrCode"></div>

</div>

</div>
</div>

<script>
const qrMontants = {
  "BEPC/CAP": "Paiement OM\n658074753\n2000 FCFA",
  "Probatoire": "Paiement OM\n658074753\n3000 FCFA",
  "Baccalauréat": "Paiement OM\n658074753\n5000 FCFA"
};

function updateMontant(){
    let n=document.getElementById("niveau").value;
    let m=document.getElementById("montant");
    if(n=="BEPC/CAP") m.value="2000 FCFA";
    else if(n=="Probatoire") m.value="3000 FCFA";
    else if(n=="Baccalauréat") m.value="5000 FCFA";
    else m.value="";
}

function updateMontantPaiement(){
    let niveau=document.getElementById("niveau").value;
    let montantText="--";
    if(niveau=="BEPC/CAP") montantText="2000 FCFA";
    else if(niveau=="Probatoire") montantText="3000 FCFA";
    else if(niveau=="Baccalauréat") montantText="5000 FCFA";
    document.getElementById("montantPaiement").innerText=montantText;
}

function updateQR(){
    let niveau=document.getElementById("niveau").value;
    let qrContainer=document.getElementById("qrCode");
    qrContainer.innerHTML="";
    if(niveau in qrMontants){
        new QRCode(qrContainer,{text:qrMontants[niveau],width:140,height:140});
    }
}

document.getElementById("niveau").addEventListener("change", ()=>{
    updateMontant();
    updateMontantPaiement();
    updateQR();
});

function envoyer(){
    let nom=document.getElementById("nom").value.trim();
    let num=document.getElementById("numero").value.trim();
    let niv=document.getElementById("niveau").value;
    let mon=document.getElementById("montant").value;
    let trans=document.getElementById("transaction").value.trim();
    let msgUser=document.getElementById("message").value.trim();
    let preuve=document.getElementById("preuve").files[0];

    if(!nom || !num || !niv || !mon || !preuve){
        alert("Remplis les champs obligatoires !");
        return;
    }

    let box=document.getElementById("msg");
    box.style.display="block";
    box.style.background="#f1c40f";
    box.innerHTML="⏳ Envoi...";

    let reader = new FileReader();
    reader.onload = function(){
        let text=`Nouvelle inscription:\nNom: ${nom}\nNuméro: ${num}\nNiveau: ${niv}\nMontant: ${mon}\nTransaction: ${trans || "Non fourni"}\nMotif: ${msgUser || "Non précisé"}`;
        window.open("https://wa.me/237678171894?text="+encodeURIComponent(text));
        box.style.background="#2ecc71";
        box.innerHTML="✅ Envoyé !";
    };
    reader.readAsDataURL(preuve);
}
</script>

</body>
</html>
