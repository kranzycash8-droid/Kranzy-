<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background: linear-gradient(135deg,#1e3c72,#6a11cb,#f5f7fa);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.app{width:100%;max-width:400px;padding:20px;}

.card{
    background: rgba(255,255,255,0.12);
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.logo{text-align:center;margin-bottom:15px;}
.logo img{
    width:90px;height:90px;border-radius:50%;
    border:3px solid #25D366;background:#fff;padding:5px;
}

h1{text-align:center;font-size:1.5em;}
.subtitle{text-align:center;opacity:0.85;margin-bottom:15px;}

.counter{
    background:#ff4d4d;
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.input-group{margin-bottom:12px;}

input,select,textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.18);
    color:#fff;
}

input::placeholder,textarea::placeholder{color:#ddd;}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#25D366,#128C7E);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:active{transform:scale(0.97);}

.payment{margin-top:18px;}

.payment-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.1);
    padding:8px;
    border-radius:10px;
    margin-bottom:8px;
}

.payment-item img{
    width:30px;height:30px;background:#fff;border-radius:5px;padding:3px;
}

.fade{
    animation:fadeIn 0.6s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>
<div class="app fade">
<div class="card">

<div class="logo">
<img src="logo.jpeg">
</div>

<h1>Groupe Premium 📚</h1>
<p class="subtitle">Réussis avec les meilleurs 🔥</p>

<!-- ✅ Compteur FIXE -->
<div class="counter">⚠️ Places restantes : 20</div>

<div class="input-group"><input type="text" id="nom" placeholder="Nom complet"></div>
<div class="input-group"><input type="tel" id="numero" placeholder="Numéro WhatsApp"></div>

<div class="input-group">
<select id="niveau">
<option value="">Choisir ton niveau</option>
<option value="BEPC/CAP">BEPC / CAP</option>
<option value="Probatoire">Probatoire</option>
<option value="Baccalauréat">Baccalauréat</option>
</select>
</div>

<div class="input-group">
<input type="text" id="montant" readonly placeholder="Frais d’adhésion">
</div>

<div class="input-group">
<input type="file" id="preuve">
</div>

<div class="input-group">
<input type="text" id="transaction" placeholder="Numéro de transaction (facultatif)">
</div>

<div class="input-group">
<textarea id="message" placeholder="Motif d’adhésion"></textarea>
</div>

<button onclick="envoyer()">Envoyer</button>

<p style="text-align:center;font-size:0.8em;margin-top:8px;">
📌 Envoie ensuite ta capture sur WhatsApp
</p>

<div class="payment">
<div class="payment-item">
<img src="mtn.jpeg">
<div>MTN MoMo : <strong>651959164</strong></div>
</div>

<div class="payment-item">
<img src="orange.png">
<div>Orange Money : <strong>658074753</strong></div>
</div>

<p style="text-align:center;">Montant : <span id="montantPaiement">--</span></p>
</div>

</div>
</div>

<script>
// 🎯 Prix
const prix = {
"BEPC/CAP":3000,
"Probatoire":5000,
"Baccalauréat":7000
};

// 📌 Mise à jour montant
document.getElementById("niveau").addEventListener("change",()=>{
let n=niveau.value;
montant.value = n ? prix[n]+" FCFA" : "";
montantPaiement.innerText = n ? prix[n]+" FCFA" : "--";
});

// 🚀 Envoi WhatsApp
function envoyer(){
let nom=nom.value.trim();
let num=numero.value.trim();
let niv=niveau.value;
let mon=montant.value;
let preuve=document.getElementById("preuve").files[0];

if(!nom || !num || !niv || !mon || !preuve){
alert("Remplis tous les champs !");
return;
}

let text=`📥 Nouvelle inscription

👤 ${nom}
📱 ${num}
🎓 ${niv}
💰 ${mon}

📸 J’envoie la preuve maintenant.`;

// 📲 WhatsApp
window.open("https://wa.me/237678171894?text="+encodeURIComponent(text));
}

// 🛡️ Sécurité anti bug Android
window.onerror=function(){
document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:50px;'>⚠️ Une erreur a été évitée</h2>";
};
</script>

</body>
</html>
